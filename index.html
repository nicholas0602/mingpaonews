<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTHK Local News Card</title>
  <style>
    :root { --bg:#fff; --fg:#111; --muted:#666; --line:#d9d9d9; }
    * { box-sizing:border-box; }
    html, body {
      margin:0;
      padding:0;
      width:280px;
      height:150px;
      overflow:hidden;
      background:var(--bg);
      color:var(--fg);
      font-family: Arial, "Noto Sans TC", sans-serif;
    }
    body { padding:8px; }
    .card {
      width:100%;
      height:100%;
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 11px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:6px;
    }
    .header {
      font-size:13px;
      font-weight:700;
      padding-bottom:4px;
      border-bottom:1px solid var(--line);
    }
    .news {
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:0;
    }
    .item {
      font-size:13px;
      line-height:1.18;
      font-weight:700;
      color:var(--fg);
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:3;
      overflow:hidden;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .footer {
      border-top:1px solid var(--line);
      padding-top:3px;
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .loading {
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="header">RTHK 本地新聞</div>
    <div class="news" id="news">
      <div class="loading">讀取中…</div>
    </div>
    <div class="footer" id="time">資料來源：news.json</div>
  </main>
  <script>
    async function loadNews() {
      try {
        const res = await fetch('./news.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('news').innerHTML = `
          <div class="item">${data.title1 || '未有新聞'}</div>
          <div class="item">${data.title2 || ''}</div>
        `;
        document.getElementById('time').textContent = data.updatedAt ? `最後更新：${data.updatedAt}` : '資料來源：news.json';
      } catch (e) {
        document.getElementById('news').innerHTML = `
          <div class="item">新聞讀取失敗</div>
          <div class="item">${e.message}</div>
        `;
      }
    }
    loadNews();
  </script>
</body>
</html>
