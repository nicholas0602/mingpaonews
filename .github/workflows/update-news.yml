name: Update Ming Pao News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Fetch Ming Pao RSS
        run: node fetch-news.mjs

      - name: Show news.json
        run: cat news.json
